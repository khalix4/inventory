<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f6f8;
    }
    .card {
      border-radius: 1rem;
    }
    .table td, .table th {
      vertical-align: middle;
    }
    .btn i {
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="text-center mb-5">
      <h2 class="fw-bold">📦 Inventory Price & Expiry Manager</h2>
      <p class="text-muted">Easily manage products, track expirations and get notified automatically.</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card shadow-sm p-4">
          <h5 class="mb-3">Add / Edit Item</h5>
          <form id="itemForm">
            <input type="hidden" id="itemId" />
            <div class="mb-3"><input required class="form-control" id="itemName" placeholder="Item Name" /></div>
            <div class="mb-3"><input required class="form-control" id="department" placeholder="Department" /></div>
            <div class="row g-2 mb-3">
              <div class="col"><input required type="number" class="form-control" id="totalCost" placeholder="Total Cost" /></div>
              <div class="col"><input required type="number" class="form-control" id="quantity" placeholder="Quantity" /></div>
            </div>
            <div class="row g-2 mb-3">
              <div class="col"><input required type="number" class="form-control" id="profitPercent" placeholder="Profit %" /></div>
              <div class="col"><input type="number" class="form-control" id="alertPrice" placeholder="Alert Price (₦ optional)" /></div>
            </div>
            <div class="mb-3"><input required type="date" class="form-control" id="expirationDate" /></div>
            <div class="mb-3"><input required type="email" class="form-control" id="email" placeholder="Notification Email" /></div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="fas fa-save"></i> Save Item
            </button>
          </form>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card shadow-sm p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">📋 Tracked Items</h5>
            <button class="btn btn-outline-secondary btn-sm" onclick="loadItems()">
              <i class="fas fa-sync"></i> Refresh
            </button>
          </div>
          <div class="table-responsive">
            <table class="table table-bordered align-middle" id="itemsTable">
              <thead class="table-light">
                <tr>
                  <th>Item</th><th>Dept</th><th>Cost</th><th>Qty</th><th>Profit%</th>
                  <th>Selling ₦</th><th>Expires</th><th>Email</th><th>Action</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script defer src="/script.js"></script>
</body>
</html>
